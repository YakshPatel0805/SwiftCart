services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: swiftcart-mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: SwiftCart
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - swiftcart-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Database Initialization Service
  db-init:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: swiftcart-db-init
    environment:
      MONGODB_URI: mongodb://mongodb:27017/SwiftCart
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - swiftcart-network
    command: sh -c "sleep 5 && node src/scripts/initMongoAuth.js"
    restart: "no"

  # Backend Service
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: swiftcart-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/SwiftCart
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
      USER_EMAIL: ${USER_EMAIL}
      USER_EMAIL_PASSWORD: ${USER_EMAIL_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_EMAIL_PASSWORD: ${ADMIN_EMAIL_PASSWORD}
      REDIS_URI: ${REDIS_URI}
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - swiftcart-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swiftcart-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:5000
    depends_on:
      - backend
    networks:
      - swiftcart-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  swiftcart-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:
